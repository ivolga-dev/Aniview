<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeStream Premium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0b0e14; color: #fff; min-height: 100vh;
        }
        .header { 
            background: rgba(20, 24, 35, 0.9); padding: 1rem 2rem; 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #2d3446;
        }
        .header h1 { 
            font-size: 1.5rem; background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .search-section { margin-bottom: 1.5rem; display: flex; gap: 10px; }
        .search-box { 
            flex: 1; padding: 0.8rem 1.2rem; background: #1a1f2b; 
            border: 1px solid #32394d; border-radius: 12px; color: #fff; outline: none;
        }
        .search-btn { 
            padding: 0.8rem 1.5rem; background: #3a7bd5; border: none; 
            border-radius: 12px; color: #fff; cursor: pointer; font-weight: bold;
        }
        .content-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; 
        }
        .anime-card { 
            background: #1a1f2b; border-radius: 12px; overflow: hidden; 
            cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .anime-card:hover { transform: translateY(-3px); border-color: #3a7bd5; }
        .anime-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .anime-info { padding: 10px; font-size: 0.9rem; font-weight: 500; text-align: center; }
        
        /* Modal */
        .player-modal { 
            display: none; position: fixed; inset: 0; background: #000; 
            z-index: 1000; overflow-y: auto; 
        }
        .player-modal.active { display: block; }
        .modal-content { max-width: 900px; margin: 0 auto; padding: 10px; }
        .close-btn { 
            display: block; width: 40px; height: 40px; margin: 10px 0 10px auto;
            background: #2d3446; border: none; color: #fff; border-radius: 50%;
            font-size: 1.5rem; cursor: pointer;
        }
        .player-container { 
            background: #111; border-radius: 12px; overflow: hidden; 
            aspect-ratio: 16/9; width: 100%; border: 1px solid #32394d;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .anime-details { margin-top: 20px; padding: 15px; line-height: 1.5; color: #ccc; }
        .loading { padding: 2rem; text-align: center; color: #3a7bd5; font-weight: bold; }
        .error { color: #ff5e5e; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="header"><h1>🎬 AnimeStream</h1></div>

    <div class="container">
        <div class="search-section">
            <input type="text" class="search-box" id="searchInput" placeholder="Поиск аниме...">
            <button class="search-btn" onclick="searchAnime()">Найти</button>
        </div>
        <div id="animeGrid" class="content-grid"></div>
    </div>

    <div id="playerModal" class="player-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closePlayer()">&times;</button>
            <div class="player-container" id="videoContainer"></div>
            <div id="animeDetails" class="anime-details"></div>
        </div>
    </div>

    <script>
        const JIKAN_API = 'https://api.jikan.moe/v4';
        const KODIK_TOKEN = '77a064344baaef3988583486337581ff';

        async function loadCategory(cat) {
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = '<div class="loading">Загрузка...</div>';
            try {
                const res = await fetch(`${JIKAN_API}/top/anime?filter=${cat}&limit=20`);
                const data = await res.json();
                renderGrid(data.data);
            } catch (e) { grid.innerHTML = '<div class="error">Ошибка API</div>'; }
        }

        async function searchAnime() {
            const q = document.getElementById('searchInput').value;
            if(!q) return;
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = '<div class="loading">Поиск...</div>';
            try {
                const res = await fetch(`${JIKAN_API}/anime?q=${encodeURIComponent(q)}&limit=20`);
                const data = await res.json();
                renderGrid(data.data);
            } catch (e) { grid.innerHTML = '<div class="error">Ошибка поиска</div>'; }
        }

        function renderGrid(list) {
            document.getElementById('animeGrid').innerHTML = list.map(a => `
                <div class="anime-card" onclick="openAnime(${a.mal_id})">
                    <img src="${a.images.jpg.large_image_url}" class="anime-poster" loading="lazy">
                    <div class="anime-info">${a.title}</div>
                </div>
            `).join('');
        }

        async function openAnime(id) {
            const modal = document.getElementById('playerModal');
            const container = document.getElementById('videoContainer');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            container.innerHTML = '<div class="loading">Ищем плеер...</div>';

            try {
                // Данные об аниме
                const infoRes = await fetch(`${JIKAN_API}/anime/${id}`);
                const info = await infoRes.json();
                document.getElementById('animeDetails').innerHTML = `
                    <h2 style="color:#fff; margin-bottom:10px">${info.data.title}</h2>
                    <p>${info.data.synopsis || 'Описание отсутствует.'}</p>
                `;

                // Используем JSONP для обхода CORS
                const callbackName = 'kodik_cb_' + Date.now();
                window[callbackName] = function(data) {
                    if (data.results && data.results.length > 0) {
                        let link = data.results[0].link;
                        if(!link.startsWith('http')) link = 'https:' + link;
                        container.innerHTML = `<iframe src="${link}" allowfullscreen></iframe>`;
                    } else {
                        container.innerHTML = '<div class="error">Видео еще не добавлено. Попробуйте другой тайтл.</div>';
                    }
                    delete window[callbackName];
                };

                const script = document.createElement('script');
                script.src = `https://kodikapi.com/search?token=${KODIK_TOKEN}&shikimori_id=${id}&callback=${callbackName}`;
                document.body.appendChild(script);
                script.onload = () => script.remove();

            } catch (e) {
                container.innerHTML = '<div class="error">Ошибка соединения.</div>';
            }
        }

        function closePlayer() {
            document.getElementById('playerModal').classList.remove('active');
            document.getElementById('videoContainer').innerHTML = '';
            document.body.style.overflow = 'auto';
        }

        loadCategory('airing');
    </script>
</body>
</html>
