
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AniView NextGen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05070a; color: #e6edf3; font-family: -apple-system, system-ui, sans-serif; }
        .glass { background: #0d1117; border: 1px solid #30363d; border-radius: 24px; }
        .terminal-text { font-family: 'ui-monospace', monospace; font-size: 10px; }
        .btn-glow { box-shadow: 0 0 20px rgba(35, 134, 54, 0.2); }
        iframe { border-radius: 16px; background: #000; transition: all 0.3s ease; }
    </style>
</head>
<body class="p-4 sm:p-10">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 id="anime-title" class="text-3xl font-black tracking-tighter uppercase italic text-white">AniView</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="node-status" class="w-2 h-2 rounded-full bg-zinc-600 animate-pulse"></span>
                    <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Secure Tunneling Active</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="tryNextMirror()" class="px-4 py-2 glass text-[10px] font-bold uppercase hover:border-blue-500 transition">Сменить зеркало</button>
            </div>
        </div>

        <!-- Video Area -->
        <div class="glass p-1.5 relative aspect-video shadow-2xl overflow-hidden group">
            <iframe id="player" class="w-full h-full" src="" frameborder="0" allowfullscreen allow="autoplay"></iframe>
            
            <div id="loader" class="absolute inset-0 bg-[#05070a] flex flex-col items-center justify-center z-50">
                <div class="w-12 h-12 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 terminal-text uppercase tracking-[0.4em] text-blue-500">Bypassing DNS Filters...</p>
            </div>
        </div>

        <!-- Log Panel -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="md:col-span-2 glass p-6 space-y-4 border-t-2 border-blue-900/30">
                <p class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest italic">Traffic Analysis</p>
                <div id="log" class="terminal-text text-zinc-500 space-y-1 h-20 overflow-y-auto">
                    <p>> Waiting for system signal...</p>
                </div>
            </div>
            <button onclick="copyLink()" class="glass bg-blue-600/10 border-blue-500/30 hover:bg-blue-600/20 text-blue-400 font-bold text-[10px] uppercase tracking-widest transition active:scale-95">
                Поделиться
            </button>
        </div>
    </div>

    <script>
        const API = "https://ivolga392-my-anime-api.hf.space";
        const params = new URLSearchParams(window.location.search);
        const anime = params.get('title') || "Dr. Stone";
        
        let mirrors = [];
        let currentIdx = 0;

        function addLog(msg, type = "info") {
            const colors = { info: "text-zinc-500", success: "text-green-500", err: "text-red-500" };
            const log = document.getElementById('log');
            log.innerHTML += `<p class="${colors[type]}">> ${msg}</p>`;
            log.scrollTop = log.scrollHeight;
        }

        async function init() {
            document.getElementById('anime-title').innerText = anime;
            addLog("Initializing secure handshake...");

            try {
                const res = await fetch(API + "/");
                if(res.ok) {
                    document.getElementById('node-status').classList.replace('bg-zinc-600', 'bg-green-500');
                    addLog("Node established: HuggingFace-Paris", "success");
                }
            } catch(e) { addLog("Master Node unreachable", "err"); }

            try {
                addLog(`Decrypting streams for "${anime}"...`);
                const search = await fetch(`${API}/search?q=${encodeURIComponent(anime)}`);
                const data = await search.json();

                if(data.found) {
                    mirrors = data.alternatives;
                    loadMirror(0);
                    addLog(`Found ${mirrors.length} secure mirrors.`);
                } else {
                    addLog("Direct ID not found. Using search mode.", "err");
                    document.getElementById('player').src = `https://kodik.info/search?title=${encodeURIComponent(anime)}`;
                }
            } catch(e) { addLog("Network error during decryption", "err"); }

            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 3000);
        }

        function loadMirror(idx) {
            if(!mirrors[idx]) return;
            currentIdx = idx;
            const domain = new URL(mirrors[idx]).hostname;
            addLog(`Switching to mirror: ${domain}`, "success");
            document.getElementById('player').src = mirrors[idx];
        }

        function tryNextMirror() {
            currentIdx = (currentIdx + 1) % mirrors.length;
            loadMirror(currentIdx);
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            addLog("System link copied.");
        }

        window.onload = init;
    </script>
</body>
</html>
