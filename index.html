<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeStream</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f0c29;
    color:white;
}

.header {
    padding:15px;
    text-align:center;
    background:#1e1e2f;
    font-size:22px;
}

.container {
    padding:15px;
}

.search-box {
    margin-bottom:15px;
}

input {
    padding:10px;
    width:70%;
    border-radius:10px;
    border:none;
}

button {
    padding:10px;
    border-radius:10px;
    border:none;
    cursor:pointer;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
    gap:15px;
}

.card {
    background:#1e1e2f;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}

.card img {
    width:100%;
}

.title {
    padding:5px;
    font-size:14px;
}

.player {
    margin-top:20px;
}

iframe {
    width:100%;
    height:400px;
    border:none;
    border-radius:10px;
}

.episodes {
    margin-top:10px;
}

.episodes button {
    margin:5px;
    padding:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🎬 AnimeStream</div>

<div class="container">

<div class="search-box">
    <input id="search" placeholder="Поиск аниме..." 
           onkeypress="if(event.key==='Enter') searchAnime()">
    <button onclick="searchAnime()">Поиск</button>
</div>

<div id="grid" class="grid"></div>

<div class="player" id="player"></div>
<div class="episodes" id="episodes"></div>

</div>

<script>
const API = "https://api.jikan.moe/v4";

// загрузка топа
async function loadTop() {
    const res = await fetch(API + "/top/anime");
    const data = await res.json();
    render(data.data);
}

// рендер карточек (ИСПРАВЛЕНО)
function render(list) {
    const grid = document.getElementById("grid");

    grid.innerHTML = list.map(a => `
        <div class="card" data-title="${a.title.replace(/"/g, '&quot;')}">
            <img src="${a.images.jpg.image_url}">
            <div class="title">${a.title}</div>
        </div>
    `).join("");

    // обработчик клика
    document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", () => {
            openAnime(card.dataset.title);
        });
    });
}

// поиск
async function searchAnime() {
    const q = document.getElementById("search").value.trim();
    if (!q) return;

    const res = await fetch(API + "/anime?q=" + q + "&limit=20");
    const data = await res.json();
    render(data.data);
}

// открытие аниме
function openAnime(title) {
    const player = document.getElementById("player");
    const episodes = document.getElementById("episodes");

    // первый эпизод
    player.innerHTML = `
        <iframe src="https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(title + ' anime episode 1')}"></iframe>
    `;

    // список серий (демо)
    episodes.innerHTML = "";

    for (let i = 1; i <= 12; i++) {
        episodes.innerHTML += `
            <button onclick="playEpisode('${title.replace(/'/g,"")} ', ${i})">
                Серия ${i}
            </button>
        `;
    }
}

// переключение серии
function playEpisode(title, ep) {
    const player = document.getElementById("player");

    player.innerHTML = `
        <iframe src="https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(title + ' episode ' + ep)}"></iframe>
    `;
}

// старт
loadTop();
</script>

</body>
</html>
