
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniView — Anti-Block 4.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #08080a; color: #94a3b8; }
        .anime-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .anime-card:hover { transform: translateY(-10px) scale(1.02); }
        .player-shell { background: radial-gradient(circle at center, #1a1a1f 0%, #08080a 100%); }
        iframe { background: transparent; border: none; width: 100%; height: 100%; }
        .btn-active { background: #2563eb; color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [query, setQuery] = useState('');
            const [results, setResults] = useState([]);
            const [trending, setTrending] = useState([]);
            const [selected, setSelected] = useState(null);
            const [node, setNode] = useState(0);

            useEffect(() => {
                fetch("https://shikimori.one/api/animes?limit=24&order=popularity&kind=tv")
                    .then(r => r.json())
                    .then(data => setTrending(data));
            }, []);

            const search = async (e) => {
                e.preventDefault();
                if (!query) return;
                const r = await fetch(`https://shikimori.one/api/animes?search=${encodeURIComponent(query)}&limit=30`);
                const data = await r.json();
                setResults(data);
            };

            const getPlayerLinks = (anime) => {
                const sId = anime.id;
                // Список агрегаторов, которые лучше всего работают в ОАЭ и через VPN
                return [
                    { name: "Узел 1 (Kodik ID)", url: `https://kodik.info/find-player?shikimori_id=${sId}` },
                    { name: "Узел 2 (Mirror)", url: `https://shikicinema.org/embed/${sId}` },
                    { name: "Узел 3 (NoAds)", url: `https://black-m.ru/player/index.php?shikimori=${sId}` },
                    { name: "Global (Proxy)", url: `https://vidsrc.me/embed/anime?shikimori=${sId}` }
                ];
            };

            return (
                <div className="min-h-screen">
                    <nav className="fixed top-0 w-full z-50 bg-[#08080a]/80 backdrop-blur-2xl border-b border-white/5 px-6 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => {setResults([]); setQuery('');}}>
                            <div className="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-xl shadow-blue-600/20 text-white font-black italic text-xl">A</div>
                            <span className="text-white font-black tracking-tighter text-2xl uppercase italic hidden sm:block">AniView</span>
                        </div>

                        <form onSubmit={search} className="flex-grow max-w-xl mx-8 relative">
                            <input 
                                className="w-full bg-zinc-900 border border-zinc-800 rounded-2xl py-3 px-6 text-sm text-white focus:outline-none focus:border-blue-600 transition-all shadow-inner"
                                placeholder="Поиск аниме (например: Наруто)..."
                                value={query}
                                onChange={e => setQuery(e.target.value)}
                            />
                        </form>

                        <div className="text-[10px] font-black text-zinc-600 uppercase tracking-[0.3em] hidden md:block">
                            Proxy Active
                        </div>
                    </nav>

                    <main className="pt-28 px-6 max-w-[1600px] mx-auto pb-20">
                        <h2 className="text-white font-black text-3xl uppercase italic tracking-tighter mb-10 flex items-center gap-4">
                            {results.length > 0 ? "Результаты" : "Популярное"}
                            <div className="h-[2px] flex-grow bg-gradient-to-r from-blue-600 to-transparent opacity-20"></div>
                        </h2>

                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-6">
                            {(results.length > 0 ? results : trending).map(anime => (
                                <div key={anime.id} className="anime-card group cursor-pointer" onClick={() => {setSelected(anime); setNode(0);}}>
                                    <div className="relative aspect-[3/4.5] rounded-[2rem] overflow-hidden bg-zinc-900 border border-white/5 shadow-2xl shadow-black">
                                        <img 
                                            src={`https://shikimori.one${anime.image.original}`} 
                                            className="w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 transition-all duration-500"
                                            loading="lazy"
                                        />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80"></div>
                                        <div className="absolute top-4 right-4 bg-blue-600 text-white text-[10px] font-black px-2 py-1 rounded-lg">
                                            ★ {anime.score}
                                        </div>
                                        <div className="absolute bottom-4 left-4 right-4">
                                            <p className="text-white font-bold text-xs uppercase leading-tight line-clamp-2">{anime.russian || anime.name}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {selected && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-0 sm:p-4 md:p-8 animate-in fade-in duration-300">
                            <div className="absolute inset-0 bg-black/98 backdrop-blur-3xl" onClick={() => setSelected(null)}></div>
                            <div className="relative w-full max-w-6xl aspect-video player-shell sm:rounded-[3rem] overflow-hidden shadow-[0_0_100px_rgba(0,0,0,0.5)] border border-white/10 flex flex-col h-full sm:h-auto">
                                <div className="flex-grow relative">
                                    <iframe 
                                        src={getPlayerLinks(selected)[node].url} 
                                        allowFullScreen
                                        scrolling="no"
                                    ></iframe>
                                    
                                    <div className="absolute top-6 left-6 flex flex-wrap gap-2 group-hover:opacity-100">
                                        {getPlayerLinks(selected).map((s, i) => (
                                            <button 
                                                key={i}
                                                onClick={() => setNode(i)}
                                                className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest border transition-all ${node === i ? 'btn-active border-transparent' : 'bg-black/60 text-zinc-500 border-white/5 hover:text-white'}`}
                                            >
                                                {s.name}
                                            </button>
                                        ))}
                                    </div>

                                    <button onClick={() => setSelected(null)} className="absolute top-6 right-6 bg-white/5 hover:bg-red-600 p-2.5 rounded-full text-white transition-colors border border-white/10">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M18 6 6 18M6 6l12 12"/></svg>
                                    </button>
                                </div>
                                <div className="p-8 flex items-center justify-between bg-zinc-950/50">
                                    <div>
                                        <h3 className="text-white font-black text-xl uppercase italic tracking-tighter">{selected.russian || selected.name}</h3>
                                        <p className="text-[10px] font-bold text-zinc-500 uppercase mt-1">Сервер: {getPlayerLinks(selected)[node].name} • Стабильный поток</p>
                                    </div>
                                    <div className="hidden sm:block">
                                        <span className="text-[9px] font-black text-blue-600 bg-blue-600/10 px-4 py-2 rounded-full uppercase tracking-widest border border-blue-600/20">
                                            Secure Access Enabled
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
