<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Sync Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05070a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .player-container { box-shadow: 0 0 50px rgba(59, 130, 246, 0.15); }
        .shimmer {
            background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-2 md:p-6">
    <div class="w-full max-w-6xl">
        <!-- Заголовок -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 px-2">
            <div>
                <h1 id="animeTitle" class="text-2xl md:text-3xl font-black text-white tracking-tight">Загрузка...</h1>
                <div class="flex items-center gap-3 mt-1">
                    <span id="qualityBadge" class="bg-blue-600 text-[10px] font-bold px-2 py-0.5 rounded uppercase">Auto</span>
                    <span id="resultCount" class="text-xs text-gray-500 font-mono italic">Searching database...</span>
                </div>
            </div>
            <div class="flex gap-2">
                <div id="connectionStatus" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-zinc-900 border border-zinc-800 text-[11px] font-medium">
                    <div class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></div>
                    CLI ENGINE ACTIVE
                </div>
            </div>
        </div>

        <!-- Плеер -->
        <div class="player-container relative aspect-video bg-zinc-900 rounded-2xl overflow-hidden border border-white/5">
            <div id="loaderOverlay" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-[#05070a]">
                <div class="w-16 h-1 w-32 bg-zinc-800 rounded-full overflow-hidden mb-4">
                    <div id="progressBar" class="h-full bg-blue-500 w-0 transition-all duration-500"></div>
                </div>
                <p id="loaderText" class="text-xs text-gray-400 font-mono uppercase tracking-widest">Initializing Scraper...</p>
            </div>
            
            <!-- Iframe для видео -->
            <iframe id="mainPlayer" class="w-full h-full" src="" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>

        <!-- Информация и выбор -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-6">
            <div class="md:col-span-3 bg-zinc-900/50 p-5 rounded-2xl border border-white/5">
                <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">Информация о потоке</h2>
                <div id="animeInfo" class="space-y-2 text-sm text-zinc-300">
                    <p>Метод получения: <code class="text-blue-400">api.kodik.info/search</code></p>
                    <p id="details">Ожидание данных...</p>
                </div>
            </div>
            <div class="flex flex-col gap-3">
                <button onclick="window.location.reload()" class="flex items-center justify-center gap-2 bg-zinc-800 hover:bg-zinc-700 p-4 rounded-xl transition-all font-bold text-sm">
                    🔄 СЛЕДУЮЩИЙ ИСТОЧНИК
                </button>
                <button onclick="copyToClipboard()" class="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 p-4 rounded-xl transition-all font-bold text-sm">
                    🔗 КОПИРОВАТЬ ССЫЛКУ
                </button>
            </div>
        </div>
    </div>

    <script>
        // Конфигурация как в CLI
        const KODIK_TOKEN = "733615469-6523-455b-871c-4386927d3c9a"; // Публичный токен (часто используется в cli инструментах)
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('title') || '';
        const room = urlParams.get('room') || 'default';

        const animeTitleEl = document.getElementById('animeTitle');
        const loaderText = document.getElementById('loaderText');
        const progressBar = document.getElementById('progressBar');
        const mainPlayer = document.getElementById('mainPlayer');
        const loaderOverlay = document.getElementById('loaderOverlay');

        async function fetchVideo() {
            if (!query) {
                loaderText.innerText = "Error: No title provided";
                return;
            }

            animeTitleEl.innerText = query;
            
            try {
                updateLoader("Searching Kodik database...", 30);
                
                // Эмуляция ani-cli: ищем через API
                const response = await fetch(`https://kodikapi.com/search?token=${KODIK_TOKEN}&title=${encodeURIComponent(query)}&with_material_data=true`);
                const data = await response.json();

                if (data.results && data.results.length > 0) {
                    // Выбираем первый результат (самый релевантный)
                    const video = data.results[0];
                    updateLoader("Finding secure stream...", 70);
                    
                    document.getElementById('resultCount').innerText = `Found ${data.total} results. Using best match.`;
                    document.getElementById('details').innerHTML = `
                        🎬 Оригинал: ${video.title_orig || 'N/A'}<br>
                        📅 Год: ${video.year || 'N/A'}<br>
                        🌍 Тип: ${video.type || 'anime'}
                    `;

                    // Встраиваем плеер
                    // Используем протокол https и добавляем параметры для автоплея
                    let videoLink = video.link;
                    if (!videoLink.startsWith('http')) videoLink = 'https:' + videoLink;
                    
                    mainPlayer.src = videoLink;
                    
                    updateLoader("Finalizing...", 100);
                    setTimeout(() => {
                        loaderOverlay.style.opacity = '0';
                        setTimeout(() => loaderOverlay.style.display = 'none', 500);
                        document.getElementById('connectionStatus').innerHTML = '<div class="w-2 h-2 rounded-full bg-green-500"></div> STREAMING READY';
                    }, 800);

                } else {
                    loaderText.innerHTML = `<span class="text-red-500">Not found in database</span>`;
                    updateLoader("Failed", 0);
                }

            } catch (error) {
                console.error(error);
                loaderText.innerText = "API Connection Error";
            }
        }

        function updateLoader(text, percent) {
            loaderText.innerText = text;
            progressBar.style.width = percent + "%";
        }

        function copyToClipboard() {
            const el = document.createElement('textarea');
            el.value = window.location.href;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Ссылка для друзей скопирована!");
        }

        window.onload = fetchVideo;
    </script>
</body>
</html>
