<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeStream - Stable</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0b10; color: #eee; }
        .header { background: #15171e; padding: 15px 20px; border-bottom: 2px solid #3a7bd5; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #2d3446; background: #15171e; color: #fff; margin-bottom: 20px; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .anime-card { background: #15171e; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .anime-card:hover { transform: scale(1.03); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .anime-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .anime-info { padding: 8px; font-size: 0.8rem; font-weight: bold; text-align: center; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 10px; overflow-y: auto; }
        .modal.active { display: block; }
        .modal-content { max-width: 1000px; margin: 0 auto; }
        .close-btn { color: #fff; font-size: 35px; cursor: pointer; float: right; background: none; border: none; }
        .player-wrap { background: #000; width: 100%; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; margin-top: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .status-msg { padding: 20px; text-align: center; line-height: 1.6; }
        .btn-link { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #3a7bd5; color: #fff; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .loading-spin { border: 3px solid #333; border-top: 3px solid #3a7bd5; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <h2 style="color:#3a7bd5">🎬 AnimeStream</h2>
</div>

<div class="container">
    <input type="text" class="search-box" id="searchInput" placeholder="Поиск (например: Наруто, Фрирен)..." onkeypress="if(event.key==='Enter') search()">
    <div id="grid" class="content-grid"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closePlayer()">&times;</button>
        <div id="playerWrap" class="player-wrap"></div>
        <div id="details" style="padding:20px"></div>
    </div>
</div>

<script>
    const KODIK_TOKEN = '77a064344baaef3988583486337581ff';
    
    // Загрузка топа при старте
    async function start() {
        const res = await fetch('https://api.jikan.moe/v4/top/anime?limit=20');
        const data = await res.json();
        render(data.data);
    }

    async function search() {
        const q = document.getElementById('searchInput').value;
        if(!q) return;
        document.getElementById('grid').innerHTML = '<div class="status-msg">Ищем...</div>';
        const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=20`);
        const data = await res.json();
        render(data.data);
    }

    function render(list) {
        document.getElementById('grid').innerHTML = list.map(a => `
            <div class="anime-card" onclick="openAnime(${a.mal_id}, '${a.title.replace(/'/g,"")}')">
                <img src="${a.images.jpg.large_image_url}" class="anime-poster">
                <div class="anime-info">${a.title}</div>
            </div>
        `).join('');
    }

    async function openAnime(id, title) {
        const modal = document.getElementById('modal');
        const wrap = document.getElementById('playerWrap');
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        
        wrap.innerHTML = '<div style="display:flex; flex-direction:column; align-items:center"><div class="loading-spin"></div><div>Проверяем базы данных...</div></div>';
        
        try {
            const infoRes = await fetch(`https://api.jikan.moe/v4/anime/${id}`);
            const infoData = await infoRes.json();
            const anime = infoData.data;
            
            document.getElementById('details').innerHTML = `<h3>${anime.title}</h3><p style="color:#888; margin-top:10px">${anime.synopsis || ''}</p>`;

            // Если это манга
            if(anime.type === 'Manga' || anime.type === 'Novel') {
                wrap.innerHTML = '<div class="status-msg">⚠️ Это манга/новелла. Аниме-адаптации пока нет.</div>';
                return;
            }

            // Попытка загрузки через Kodik с зеркалом
            let found = false;
            const cbName = 'callback_' + id;
            
            const timeout = setTimeout(() => {
                if(!found) {
                    showFallback(title);
                }
            }, 6000);

            window[cbName] = function(data) {
                found = true;
                clearTimeout(timeout);
                if(data.results && data.results.length > 0) {
                    let url = data.results[0].link;
                    if(!url.startsWith('http')) url = 'https:' + url;
                    wrap.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
                } else {
                    showFallback(title);
                }
                delete window[cbName];
            };

            const script = document.createElement('script');
            // Используем kodikapi.info как альтернативный домен
            script.src = `https://kodikapi.com/search?token=${KODIK_TOKEN}&shikimori_id=${id}&callback=${cbName}`;
            script.onerror = () => showFallback(title);
            document.body.appendChild(script);

        } catch(e) {
            showFallback(title);
        }
    }

    function showFallback(title) {
        const wrap = document.getElementById('playerWrap');
        wrap.innerHTML = `
            <div class="status-msg">
                <p>База данных не ответила (возможно, блокировка в вашей сети).</p>
                <a href="https://yandex.ru/search/?text=смотреть+аниме+${encodeURIComponent(title)}" target="_blank" class="btn-link">Смотреть в поиске</a>
                <p style="font-size:12px; margin-top:10px; color:#666">Попробуйте обновить страницу или выключить VPN.</p>
            </div>
        `;
    }

    function closePlayer() {
        document.getElementById('modal').classList.remove('active');
        document.getElementById('playerWrap').innerHTML = '';
        document.body.style.overflow = 'auto';
    }

    start();
</script>
</body>
</html>
