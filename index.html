
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniView Direct</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем HLS.js для прямой трансляции потоков, если найдем их -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #555; font-family: 'Inter', sans-serif; }
        .player-wrap { position: relative; aspect-ratio: 16/9; background: #050505; border: 1px solid #111; border-radius: 16px; overflow: hidden; }
        .btn-control { background: #0a0a0a; border: 1px solid #1a1a1a; transition: 0.3s; }
        .btn-control:hover { background: #111; border-color: #333; color: #fff; }
        .log-box { font-family: 'JetBrains Mono', monospace; font-size: 10px; height: 100px; overflow-y: auto; }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-5xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="flex justify-between items-end px-2">
            <div>
                <h1 id="anime-title" class="text-2xl font-black text-white italic tracking-tighter uppercase">Initializing...</h1>
                <p id="status-line" class="text-[9px] font-bold text-zinc-700 tracking-[0.3em] mt-1 uppercase">Node: DISCONNECTED</p>
            </div>
            <div class="text-right text-[9px] font-bold text-blue-600 uppercase tracking-widest bg-blue-600/5 px-3 py-1 rounded-full border border-blue-600/20">
                Direct Stream Mode
            </div>
        </div>

        <!-- Player Area -->
        <div class="player-wrap shadow-2xl">
            <iframe id="main-frame" class="w-full h-full" src="" frameborder="0" allowfullscreen allow="autoplay"></iframe>
            
            <div id="loader" class="absolute inset-0 bg-[#000] flex flex-col items-center justify-center z-50">
                <div class="w-8 h-8 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-[9px] font-bold text-blue-900 tracking-widest uppercase">Executing Proxy Bypass</p>
            </div>
        </div>

        <!-- Info & Logs -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 bg-[#050505] border border-zinc-900 p-6 rounded-2xl">
                <p class="text-[9px] font-black text-zinc-800 uppercase mb-3 tracking-widest italic">Anicli Internal Logs</p>
                <div id="logs" class="log-box space-y-1">
                    <p class="text-zinc-700">> Core v7.0.1 ready.</p>
                </div>
            </div>
            
            <div class="flex flex-col gap-3">
                <button onclick="rotateShard()" class="btn-control py-4 rounded-xl text-[10px] font-bold uppercase tracking-widest">
                    Сменить зеркало (ОАЭ)
                </button>
                <button onclick="copyRoom()" class="btn-control py-4 rounded-xl text-[10px] font-bold uppercase tracking-widest">
                    Поделиться
                </button>
            </div>
        </div>
    </div>

    <script>
        const API = "https://ivolga392-my-anime-api.hf.space";
        const query = new URLSearchParams(window.location.search).get('q') || "Dr. Stone";
        
        let mirrors = [];
        let currentIdx = 0;
        let playerPath = "";

        function addLog(msg, color = "#444") {
            const l = document.getElementById('logs');
            l.innerHTML += `<p style="color: ${color}">> ${msg}</p>`;
            l.scrollTop = l.scrollHeight;
        }

        async function init() {
            document.getElementById('anime-title').innerText = query;
            addLog(`Searching for manifest: ${query}`);

            try {
                const res = await fetch(`${API}/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();

                if (data.found) {
                    mirrors = data.mirrors;
                    playerPath = data.player_url.split('/').slice(3).join('/');
                    
                    document.getElementById('status-line').innerText = "Node: CONNECTED";
                    document.getElementById('status-line').className = "text-[9px] font-bold text-blue-500 tracking-[0.3em] mt-1 uppercase";
                    
                    addLog(`Success! Found shards: ${mirrors.length}`, "#3b82f6");
                    loadMirror(0);
                } else {
                    addLog("Kodik API empty. Using brute fallback.", "#ef4444");
                    document.getElementById('main-frame').src = `https://kodik.info/search?title=${encodeURIComponent(query)}`;
                }
            } catch (e) {
                addLog("Master node failure.", "#ef4444");
            }

            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 2000);
        }

        function loadMirror(idx) {
            currentIdx = idx;
            const host = mirrors[idx];
            // Используем прямой путь к плееру, подставляя работающие домены
            const finalUrl = `${host}/${playerPath}`;
            document.getElementById('main-frame').src = finalUrl;
            addLog(`Bypass applied: ${new URL(host).hostname}`, "#888");
        }

        function rotateShard() {
            currentIdx = (currentIdx + 1) % mirrors.length;
            loadMirror(currentIdx);
        }

        function copyRoom() {
            navigator.clipboard.writeText(window.location.href);
            addLog("Link copied.");
        }

        window.onload = init;
    </script>
</body>
</html>
