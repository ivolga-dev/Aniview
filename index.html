
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AniView Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0c10; color: #f0f6fc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; overflow-x: hidden; }
        .glass { background: #161b22; border: 1px solid #30363d; border-radius: 16px; }
        .accent-border { border-left: 4px solid #2f81f7; }
        .shimmer { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        iframe { border-radius: 12px; }
        
        /* Улучшение тач-зон для мобилок */
        button { touch-action: manipulation; }
    </style>
</head>
<body class="p-4 sm:p-8">
    <div class="max-w-3xl mx-auto space-y-6">
        
        <!-- Заголовок и статус -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
            <h1 id="anime-name" class="text-2xl sm:text-3xl font-bold tracking-tight uppercase truncate max-w-[80%]">AniView</h1>
            <div id="status-badge" class="inline-flex items-center w-fit px-2 py-1 rounded text-[10px] font-bold bg-zinc-800 text-zinc-400">
                <span id="api-dot" class="w-1.5 h-1.5 rounded-full bg-zinc-600 mr-2"></span>
                <span id="status-text">CONNECTING...</span>
            </div>
        </div>

        <!-- Плеер -->
        <div class="glass overflow-hidden aspect-video relative shadow-2xl bg-black">
            <iframe id="main-player" class="w-full h-full border-none" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            
            <!-- Заставка загрузки -->
            <div id="overlay" class="absolute inset-0 bg-[#0a0c10] flex flex-col items-center justify-center space-y-4">
                <div class="w-10 h-10 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-[10px] font-mono tracking-widest text-zinc-500 shimmer uppercase">Облачный поиск...</p>
            </div>
        </div>

        <!-- Лог и управление -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="md:col-span-2 glass p-4 sm:p-6 accent-border">
                <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3 italic">System Console</h3>
                <div id="log" class="font-mono text-[10px] sm:text-[11px] text-zinc-500 space-y-1 max-h-24 overflow-y-auto">
                    <p>> Инициализация AniView...</p>
                </div>
            </div>
            
            <div class="flex flex-col gap-2">
                <button onclick="location.reload()" class="flex-1 py-3 glass font-bold text-[10px] uppercase hover:bg-zinc-800 transition active:scale-95">
                    Обновить
                </button>
                <button onclick="copyCurrentUrl()" class="flex-1 py-3 bg-blue-600 rounded-xl font-bold text-[10px] uppercase hover:bg-blue-500 transition text-white active:scale-95">
                    Поделиться
                </button>
            </div>
        </div>
    </div>

    <script>
        // ТВОЯ ССЫЛКА НА HUGGING FACE
        const API_URL = "https://ivolga392-my-anime-api.hf.space";
        
        const params = new URLSearchParams(window.location.search);
        // Поддержка параметров 'title', 'search' или 'q'
        const title = params.get('title') || params.get('search') || params.get('q') || "Dr. Stone";

        function addLog(text) {
            const logEl = document.getElementById('log');
            const time = new Date().toLocaleTimeString([], {hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit'});
            logEl.innerHTML += `<p class="truncate"><span class="text-zinc-700">[${time}]</span> ${text}</p>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function start() {
            document.getElementById('anime-name').innerText = title;

            // 1. Проверка бэкенда на Hugging Face
            try {
                const res = await fetch(API_URL + "/");
                if (res.ok) {
                    document.getElementById('status-badge').className = "inline-flex items-center w-fit px-2 py-1 rounded text-[10px] font-bold bg-green-900/10 text-green-500 border border-green-900/30";
                    document.getElementById('api-dot').className = "w-1.5 h-1.5 rounded-full bg-green-500 mr-2";
                    document.getElementById('status-text').innerText = "CLOUD ACTIVE";
                    addLog("Связь с облаком HF установлена.");
                }
            } catch (e) {
                addLog("ОШИБКА: Облако недоступно. Space спит?");
            }

            // 2. Получение ссылки на плеер
            addLog(`Поиск потоков для: ${title}`);
            try {
                const search = await fetch(`${API_URL}/search?q=${encodeURIComponent(title)}`);
                const data = await search.json();

                if (data.found || (data.items && data.items.length > 0)) {
                    let finalUrl = data.player || data.items[0].link;
                    if (finalUrl.startsWith('//')) finalUrl = 'https:' + finalUrl;
                    
                    document.getElementById('main-player').src = finalUrl;
                    addLog("Поток успешно захвачен.");
                } else {
                    addLog("НИЧЕГО НЕ НАЙДЕНО. Попробуйте уточнить название.");
                    // Fallback на поиск по названию внутри плеера
                    document.getElementById('main-player').src = `https://kodik.info/search?title=${encodeURIComponent(title)}`;
                }
            } catch (e) {
                addLog("ОШИБКА API. Используем локальное зеркало...");
                document.getElementById('main-player').src = `https://kodik.info/search?title=${encodeURIComponent(title)}`;
            }

            // 3. Скрываем лоадер через небольшую паузу
            setTimeout(() => {
                const overlay = document.getElementById('overlay');
                overlay.style.transition = 'opacity 0.5s ease';
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500);
            }, 2500);
        }

        function copyCurrentUrl() {
            const url = window.location.href;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(() => alert("Ссылка скопирована!"));
            } else {
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                alert("Ссылка скопирована!");
            }
        }

        window.onload = start;
    </script>
</body>
</html>
