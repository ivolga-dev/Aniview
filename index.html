<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeStream Player</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f0c29;
    color:white;
}

.header {
    padding:15px;
    text-align:center;
    background:#1e1e2f;
    font-size:22px;
}

.container {
    padding:15px;
}

input {
    padding:10px;
    width:70%;
    border-radius:10px;
    border:none;
}

button {
    padding:10px;
    border-radius:10px;
    border:none;
    cursor:pointer;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
    margin-top:20px;
}

.card {
    background:#1e1e2f;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}

.card img {
    width:100%;
}

.title {
    padding:5px;
    font-size:14px;
}

video {
    width:100%;
    margin-top:20px;
    border-radius:10px;
    background:black;
}

.episodes {
    margin-top:10px;
}

.episodes button {
    margin:5px;
}
</style>
</head>

<body>

<div class="header">🎬 AnimeStream</div>

<div class="container">

<input id="search" placeholder="Поиск аниме..." 
       onkeypress="if(event.key==='Enter') searchAnime()">
<button onclick="searchAnime()">Поиск</button>

<div id="grid" class="grid"></div>

<video id="player" controls></video>
<div id="episodes" class="episodes"></div>

</div>

<script>
const API = "https://api.jikan.moe/v4";

// Демо-эпизоды (заменишь потом на реальные)
const demoEpisodes = [
    "https://www.w3schools.com/html/mov_bbb.mp4",
    "https://www.w3schools.com/html/movie.mp4"
];

// загрузка топа
async function loadTop() {
    const res = await fetch(API + "/top/anime");
    const data = await res.json();
    render(data.data);
}

// рендер
function render(list) {
    const grid = document.getElementById("grid");

    grid.innerHTML = list.map(a => `
        <div class="card" data-title="${a.title.replace(/"/g,'&quot;')}">
            <img src="${a.images.jpg.image_url}">
            <div class="title">${a.title}</div>
        </div>
    `).join("");

    document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", () => {
            openAnime(card.dataset.title);
        });
    });
}

// поиск
async function searchAnime() {
    const q = document.getElementById("search").value.trim();
    if (!q) return;

    const res = await fetch(API + "/anime?q=" + q);
    const data = await res.json();
    render(data.data);
}

// открытие аниме
function openAnime(title) {
    const player = document.getElementById("player");
    const episodes = document.getElementById("episodes");

    player.src = demoEpisodes[0];
    player.play();

    episodes.innerHTML = "";

    demoEpisodes.forEach((url, index) => {
        episodes.innerHTML += `
            <button onclick="playEpisode(${index})">
                Серия ${index + 1}
            </button>
        `;
    });
}

// смена серии
function playEpisode(index) {
    const player = document.getElementById("player");

    player.src = demoEpisodes[index];
    player.play();
}

loadTop();
</script>

</body>
</html>
