
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniView Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #050505; color: #eee; font-family: 'JetBrains Mono', monospace; }
        .player-container { background: #000; border: 1px solid #222; border-radius: 12px; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        .status-tag { font-size: 9px; font-weight: bold; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
        .log-area { font-size: 10px; color: #666; max-height: 100px; overflow-y: auto; }
        .active-glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">
    <div class="w-full max-w-4xl space-y-6">
        
        <!-- Header -->
        <div class="flex justify-between items-end border-b border-zinc-900 pb-4">
            <div>
                <h1 id="main-title" class="text-2xl font-bold tracking-tighter text-white">ANIVIEW_SYSTEM</h1>
                <p id="sub-title" class="text-xs text-zinc-500 mt-1 italic">Waiting for input...</p>
            </div>
            <div class="flex flex-col items-end">
                <div id="api-status" class="status-tag bg-zinc-900 text-zinc-600">Offline</div>
                <div class="text-[9px] mt-1 text-zinc-700">VER: 6.0.2_STABLE</div>
            </div>
        </div>

        <!-- Player -->
        <div class="player-container relative aspect-video overflow-hidden group">
            <iframe id="video-frame" class="w-full h-full" src="" frameborder="0" allowfullscreen allow="autoplay"></iframe>
            
            <!-- Overlay -->
            <div id="loader" class="absolute inset-0 bg-[#050505] flex flex-col items-center justify-center transition-opacity duration-500">
                <div class="w-12 h-12 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-[10px] tracking-[0.4em] text-blue-500 animate-pulse uppercase">Extracting Streams...</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-[#0a0a0a] border border-zinc-900 p-5 rounded-xl space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold text-zinc-500 uppercase">Stream Selector</span>
                    <span id="mirror-count" class="text-[9px] text-blue-500">0 Mirrors Found</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="rotateMirror()" class="flex-1 py-3 bg-zinc-900 hover:bg-zinc-800 rounded-lg text-[10px] font-bold uppercase transition active:scale-95">
                        Next Mirror
                    </button>
                    <button onclick="copyRoom()" class="px-5 bg-blue-600 hover:bg-blue-500 text-white rounded-lg transition active:scale-95">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </button>
                </div>
            </div>

            <div class="bg-[#0a0a0a] border border-zinc-900 p-5 rounded-xl">
                <span class="text-[10px] font-bold text-zinc-500 uppercase block mb-3">Kernel Log</span>
                <div id="logs" class="log-area space-y-1">
                    <p>> Core initialized.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://ivolga392-my-anime-api.hf.space";
        const params = new URLSearchParams(window.location.search);
        const query = params.get('title') || params.get('q') || "Dr. Stone";
        
        let currentMirrors = [];
        let mirrorIdx = 0;
        let baseIframePath = "";

        function addLog(msg, color = "#666") {
            const logs = document.getElementById('logs');
            logs.innerHTML += `<p style="color: ${color}">> ${msg}</p>`;
            logs.scrollTop = logs.scrollHeight;
        }

        async function init() {
            document.getElementById('sub-title').innerText = `Target: ${query.toUpperCase()}`;
            addLog("Checking Cloud API...");

            try {
                const res = await fetch(API_URL + "/");
                if (res.ok) {
                    const badge = document.getElementById('api-status');
                    badge.innerText = "Cloud Online";
                    badge.className = "status-tag bg-blue-900/20 text-blue-500";
                    addLog("Handshake successful.", "#3b82f6");
                }
            } catch (e) { addLog("Cloud unreachable.", "#ef4444"); }

            try {
                addLog(`Querying stream data for "${query}"...`);
                const response = await fetch(`${API_URL}/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data.found) {
                    addLog("Extraction successful.", "#10b981");
                    document.getElementById('main-title').innerText = data.title.toUpperCase();
                    
                    // Сохраняем путь для ротации зеркал (метод из ani-cli-ru)
                    baseIframePath = data.player.split('/').slice(3).join('/');
                    currentMirrors = data.shards || ["https://kodik.info"];
                    
                    document.getElementById('mirror-count').innerText = `${currentMirrors.length} Shards Ready`;
                    applyStream(0);
                } else {
                    addLog("Stream not found. Using brute-force search...", "#f59e0b");
                    document.getElementById('video-frame').src = `https://kodik.info/search?title=${encodeURIComponent(query)}`;
                }
            } catch (e) {
                addLog("Kernel panic during extraction.", "#ef4444");
            }

            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 2500);
        }

        function applyStream(idx) {
            const host = currentMirrors[idx];
            const finalUrl = `${host}/${baseIframePath}`;
            document.getElementById('video-frame').src = finalUrl;
            addLog(`Switched to shard: ${new URL(host).hostname}`, "#888");
        }

        function rotateMirror() {
            mirrorIdx = (mirrorIdx + 1) % currentMirrors.length;
            applyStream(mirrorIdx);
        }

        function copyRoom() {
            navigator.clipboard.writeText(window.location.href);
            addLog("Room link copied.", "#3b82f6");
        }

        window.onload = init;
    </script>
</body>
</html>
