<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Player</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f0c29;
    color:white;
}

.header {
    padding:15px;
    text-align:center;
    background:#1e1e2f;
}

.container {
    padding:15px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
    gap:15px;
}

.card {
    background:#1e1e2f;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
}

.card img {
    width:100%;
}

.player {
    margin-top:20px;
}

iframe {
    width:100%;
    height:400px;
    border:none;
    border-radius:10px;
}

.episodes button {
    margin:5px;
    padding:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🎬 Anime Player</div>

<div class="container">

<input id="search" placeholder="Поиск..." onkeypress="if(event.key==='Enter')search()">
<button onclick="search()">Поиск</button>

<div id="grid" class="grid"></div>

<div class="player" id="player"></div>
<div class="episodes" id="episodes"></div>

</div>

<script>
const API = "https://api.jikan.moe/v4";

async function loadTop() {
    const res = await fetch(API + "/top/anime");
    const data = await res.json();
    render(data.data);
}

function render(list) {
    const grid = document.getElementById("grid");

    grid.innerHTML = list.map(a => `
        <div class="card" onclick="openAnime('${a.title}')">
            <img src="${a.images.jpg.image_url}">
            <div style="padding:5px">${a.title}</div>
        </div>
    `).join("");
}

async function search() {
    const q = document.getElementById("search").value;
    if (!q) return;

    const res = await fetch(API + "/anime?q=" + q);
    const data = await res.json();
    render(data.data);
}

function openAnime(title) {
    // пример — встраиваемый поиск (НЕ гарантирует 100% совпадение)
    const player = document.getElementById("player");
    const episodes = document.getElementById("episodes");

    player.innerHTML = `
        <iframe src="https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(title + ' anime episode 1')}"></iframe>
    `;

    // фейковые серии (демо логика)
    episodes.innerHTML = "";

    for(let i=1;i<=12;i++){
        episodes.innerHTML += `
            <button onclick="playEpisode('${title}', ${i})">Серия ${i}</button>
        `;
    }
}

function playEpisode(title, ep) {
    const player = document.getElementById("player");

    player.innerHTML = `
        <iframe src="https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(title + ' episode ' + ep)}"></iframe>
    `;
}

loadTop();
</script>

</body>
</html>
