
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniView — Ultimate Streaming</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background-color: #030303; color: #94a3b8; }
        .neon-border { border: 1px solid rgba(59, 130, 246, 0.2); transition: all 0.3s ease; }
        .neon-border:hover { border-color: rgba(59, 130, 246, 0.6); box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); }
        .player-bg { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        iframe { background: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [query, setQuery] = useState('');
            const [results, setResults] = useState([]);
            const [trending, setTrending] = useState([]);
            const [selected, setSelected] = useState(null);
            const [node, setNode] = useState(0);

            useEffect(() => {
                fetch("https://shikimori.one/api/animes?limit=18&order=popularity")
                    .then(r => r.json())
                    .then(data => setTrending(data));
            }, []);

            const handleSearch = async (e) => {
                e.preventDefault();
                if (!query) return;
                const r = await fetch(`https://shikimori.one/api/animes?search=${encodeURIComponent(query)}&limit=24`);
                const data = await r.json();
                setResults(data);
            };

            const getSources = (anime) => {
                const shikimoriId = anime.id;
                // Мы используем разные агрегаторы, которые работают через ID
                return [
                    { name: "Система 1 (Direct)", url: `https://player.vidsrc.pro/anime/shikimori/${shikimoriId}` },
                    { name: "Система 2 (Global)", url: `https://vidsrc.to/embed/anime/${shikimoriId}` },
                    { name: "Система 3 (Mirror)", url: `https://api.allvideo.monster/shikimori/${shikimoriId}` },
                    { name: "Kodik (Legacy)", url: `https://kodik.info/find-player?shikimori_id=${shikimoriId}` }
                ];
            };

            return (
                <div className="min-h-screen pb-10">
                    {/* Header */}
                    <header className="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-xl border-b border-white/5 px-6 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => {setResults([]); setQuery('');}}>
                            <div className="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-600/30">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                            </div>
                            <span className="text-white font-bold tracking-tight text-xl">ANIVIEW</span>
                        </div>

                        <form onSubmit={handleSearch} className="flex-grow max-w-xl mx-6 relative">
                            <input 
                                className="w-full bg-zinc-900/50 border border-zinc-800 rounded-2xl py-3 px-6 text-sm text-white focus:outline-none focus:border-blue-600 transition-all"
                                placeholder="Введите название..."
                                value={query}
                                onChange={e => setQuery(e.target.value)}
                            />
                        </form>

                        <div className="hidden md:flex gap-2 text-[10px] font-bold uppercase tracking-widest text-zinc-500">
                            <span className="text-blue-500">●</span> UAE Server Online
                        </div>
                    </header>

                    {/* Main Grid */}
                    <main className="pt-28 px-6 max-w-[1800px] mx-auto">
                        <h2 className="text-white font-bold text-2xl mb-8 uppercase tracking-tighter italic">
                            {results.length > 0 ? "Найдено" : "Рекомендуем"}
                        </h2>

                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-6">
                            {(results.length > 0 ? results : trending).map(anime => (
                                <div key={anime.id} className="group cursor-pointer" onClick={() => {setSelected(anime); setNode(0);}}>
                                    <div className="relative aspect-[3/4.5] rounded-3xl overflow-hidden bg-zinc-900 border border-white/5 neon-border">
                                        <img 
                                            src={`https://shikimori.one${anime.image.original}`} 
                                            className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                                            loading="lazy"
                                        />
                                        <div className="absolute top-3 right-3 bg-black/60 backdrop-blur-md px-2 py-1 rounded-xl text-[10px] font-bold text-white border border-white/10">
                                            {anime.score}
                                        </div>
                                    </div>
                                    <h3 className="mt-4 text-xs font-bold text-zinc-100 line-clamp-1 group-hover:text-blue-500 transition-colors uppercase">
                                        {anime.russian || anime.name}
                                    </h3>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Player Overlay */}
                    {selected && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center sm:p-6 md:p-12">
                            <div className="absolute inset-0 bg-black/98" onClick={() => setSelected(null)}></div>
                            
                            <div className="relative w-full max-w-6xl bg-zinc-950 border border-white/10 sm:rounded-[40px] overflow-hidden shadow-2xl flex flex-col h-full sm:h-auto">
                                
                                {/* Плеер */}
                                <div className="relative aspect-video player-bg group">
                                    <iframe 
                                        src={getSources(selected)[node].url} 
                                        className="w-full h-full"
                                        allowFullScreen
                                        frameBorder="0"
                                    ></iframe>
                                    
                                    {/* Селектор систем */}
                                    <div className="absolute top-6 left-6 flex flex-wrap gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                        {getSources(selected).map((s, i) => (
                                            <button 
                                                key={i}
                                                onClick={() => setNode(i)}
                                                className={`px-4 py-2 rounded-2xl text-[10px] font-bold uppercase tracking-widest border transition-all ${node === i ? 'bg-blue-600 border-blue-400 text-white shadow-lg' : 'bg-black/60 backdrop-blur-md border-white/10 text-zinc-400 hover:bg-black'}`}
                                            >
                                                {s.name}
                                            </button>
                                        ))}
                                    </div>

                                    <button onClick={() => setSelected(null)} className="absolute top-6 right-6 bg-black/60 p-2 rounded-full text-white hover:bg-red-600 transition backdrop-blur-md">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M18 6 6 18M6 6l12 12"/></svg>
                                    </button>
                                </div>

                                {/* Инфо */}
                                <div className="p-8 flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="text-center md:text-left">
                                        <h2 className="text-2xl font-bold text-white uppercase italic tracking-tighter">
                                            {selected.russian || selected.name}
                                        </h2>
                                        <p className="text-[10px] font-bold text-zinc-600 uppercase tracking-widest mt-1">
                                            Status: {selected.status} • {selected.episodes || "?"} Episodes
                                        </p>
                                    </div>
                                    <div className="flex gap-4">
                                        <div className="px-5 py-3 bg-zinc-900 rounded-2xl border border-white/5 flex flex-col justify-center">
                                            <span className="text-[8px] font-bold text-zinc-500 uppercase tracking-widest">Active Server</span>
                                            <span className="text-[10px] font-bold text-blue-500 uppercase">{getSources(selected)[node].name}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
