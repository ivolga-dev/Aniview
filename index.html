<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniView — Аниме Онлайн</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e4e4e7; font-family: sans-serif; margin: 0; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 20px; }
        .card { position: relative; border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s; background: #111; }
        .card:hover { transform: scale(1.03); }
        .card img { width: 100%; aspect-ratio: 3/4.5; object-cover: cover; }
        .card-title { padding: 8px; font-size: 12px; font-weight: bold; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .player-container { width: 95%; max-width: 1000px; background: #000; border-radius: 16px; overflow: hidden; position: relative; }
        .iframe-wrapper { position: relative; padding-top: 56.25%; }
        .iframe-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; z-index: 110; }
        .node-tabs { display: flex; gap: 10px; padding: 10px; background: #111; overflow-x: auto; }
        .node-btn { padding: 6px 12px; border-radius: 6px; font-size: 11px; background: #222; border: 1px solid #333; color: #aaa; cursor: pointer; white-space: nowrap; }
        .node-btn.active { background: #2563eb; color: white; border-color: #3b82f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [list, setList] = useState([]);
            const [search, setSearch] = useState('');
            const [selected, setSelected] = useState(null);
            const [node, setNode] = useState(0);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async (query = '') => {
                setLoading(true);
                const url = query 
                    ? `https://shikimori.one/api/animes?search=${encodeURIComponent(query)}&limit=24`
                    : `https://shikimori.one/api/animes?limit=24&order=popularity`;
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    setList(data);
                } catch (e) {
                    console.error("Fetch error", e);
                }
                setLoading(false);
            };

            const handleSearch = (e) => {
                e.preventDefault();
                fetchData(search);
            };

            const mirrors = selected ? [
                { name: "Зеркало 1", url: `https://www.bread-m.ru/player/index.php?shikimori=${selected.id}` },
                { name: "Зеркало 2", url: `https://black-m.ru/player/index.php?shikimori=${selected.id}` },
                { name: "Kodik ID", url: `https://kodik.info/find-player?shikimori_id=${selected.id}` },
                { name: "ShikiCinema", url: `https://shikicinema.org/embed/${selected.id}` }
            ] : [];

            return (
                <div>
                    <nav className="p-4 flex items-center justify-between border-b border-zinc-800 sticky top-0 bg-black z-50">
                        <h1 className="font-bold text-xl text-blue-500 cursor-pointer" onClick={() => {setSearch(''); fetchData();}}>AniView</h1>
                        <form onSubmit={handleSearch} className="flex-1 max-w-md mx-4">
                            <input 
                                type="text" 
                                className="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-2 text-sm outline-none focus:border-blue-500"
                                placeholder="Найти аниме..."
                                value={search}
                                onChange={(e) => setSearch(e.target.value)}
                            />
                        </form>
                    </nav>

                    {loading ? (
                        <div className="p-10 text-center text-zinc-500">Загрузка контента...</div>
                    ) : (
                        <div className="anime-grid">
                            {list.map(anime => (
                                <div key={anime.id} className="card" onClick={() => { setSelected(anime); setNode(0); }}>
                                    <img src={`https://shikimori.one${anime.image.original}`} alt={anime.name} />
                                    <div className="card-title">{anime.russian || anime.name}</div>
                                </div>
                            ))}
                        </div>
                    )}

                    {selected && (
                        <div className="overlay">
                            <div className="player-container">
                                <button className="close-btn" onClick={() => setSelected(null)}>✕</button>
                                
                                <div className="iframe-wrapper">
                                    <iframe 
                                        src={mirrors[node].url} 
                                        allowFullScreen 
                                    />
                                </div>

                                <div className="node-tabs">
                                    {mirrors.map((m, i) => (
                                        <button 
                                            key={i} 
                                            className={`node-btn ${node === i ? 'active' : ''}`}
                                            onClick={() => setNode(i)}
                                        >
                                            {m.name}
                                        </button>
                                    ))}
                                </div>
                                
                                <div className="p-4">
                                    <div className="text-white font-bold">{selected.russian || selected.name}</div>
                                    <div className="text-zinc-500 text-xs mt-1">Если плеер не грузится, переключите "Зеркало" выше.</div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
