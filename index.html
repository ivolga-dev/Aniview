
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniView X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #080a0c; color: #ced4da; font-family: 'Segoe UI', system-ui, sans-serif; }
        .glass-panel { background: #111418; border: 1px solid #2d333b; border-radius: 24px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .terminal { font-family: 'Courier New', monospace; font-size: 11px; color: #8b949e; }
        iframe { border-radius: 16px; background: #000; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-action { transition: all 0.2s ease; border-radius: 14px; text-transform: uppercase; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
    </style>
</head>
<body class="p-5 md:p-12">
    <div class="max-w-4xl mx-auto space-y-8">
        
        <!-- Header -->
        <div class="flex justify-between items-start">
            <div class="space-y-1">
                <h1 id="header-title" class="text-3xl font-black italic tracking-tighter text-white uppercase">ANIVIEW_X</h1>
                <div class="flex items-center gap-3">
                    <div id="conn-dot" class="status-dot bg-zinc-600"></div>
                    <p id="conn-text" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest text-blue-500">Connecting to Cloud...</p>
                </div>
            </div>
            <div class="text-right hidden sm:block">
                <p class="text-[9px] text-zinc-600 font-bold uppercase italic">Protocol</p>
                <p class="text-xs text-zinc-400 font-mono">TLS_V1.3_ENCRYPTED</p>
            </div>
        </div>

        <!-- Video Frame -->
        <div class="glass-panel p-2 relative aspect-video">
            <iframe id="main-video" class="w-full h-full" src="" frameborder="0" allowfullscreen allow="autoplay"></iframe>
            
            <div id="boot-loader" class="absolute inset-0 bg-[#080a0c] flex flex-col items-center justify-center z-50 transition-opacity duration-700">
                <div class="w-10 h-10 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-[9px] font-bold tracking-[0.4em] text-blue-600 animate-pulse uppercase">Syncing Shards</p>
            </div>
        </div>

        <!-- Control Center -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
            <div class="md:col-span-2 glass-panel p-6 space-y-4">
                <p class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest border-b border-zinc-800 pb-2 italic">System Output</p>
                <div id="output" class="terminal space-y-1 h-24 overflow-y-auto">
                    <p>> Waiting for init command...</p>
                </div>
            </div>
            <div class="flex flex-col gap-3">
                <button onclick="switchMirror()" class="btn-action flex-1 bg-white/5 hover:bg-white/10 border border-zinc-800 text-zinc-300">
                    Сменить зеркало
                </button>
                <button onclick="shareLink()" class="btn-action flex-1 bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-900/20">
                    Поделиться
                </button>
            </div>
        </div>
    </div>

    <script>
        const API = "https://ivolga392-my-anime-api.hf.space";
        const urlParams = new URLSearchParams(window.location.search);
        const anime = urlParams.get('title') || urlParams.get('q') || "Dr. Stone";
        
        let activeMirrors = [];
        let mirrorIndex = 0;

        function log(msg, color = "text-zinc-500") {
            const out = document.getElementById('output');
            out.innerHTML += `<p class="${color}">> ${msg}</p>`;
            out.scrollTop = out.scrollHeight;
        }

        async function init() {
            document.getElementById('header-title').innerText = anime.replace(".", " ");
            log("Starting handshake with Master Server...");

            try {
                const res = await fetch(API + "/");
                if (res.ok) {
                    document.getElementById('conn-dot').classList.replace('bg-zinc-600', 'bg-green-500');
                    document.getElementById('conn-text').innerText = "Cloud Online";
                    document.getElementById('conn-text').className = "text-[10px] font-bold text-green-500 uppercase tracking-widest";
                    log("Cloud Status: SECURE", "text-green-500");
                }
            } catch (e) { log("Connection unstable. Fallback active.", "text-yellow-600"); }

            try {
                log(`Searching for data: ${anime}`);
                const search = await fetch(`${API}/search?q=${encodeURIComponent(anime)}`);
                const data = await search.json();

                if (data.found) {
                    activeMirrors = data.alternatives;
                    log(`Found ${activeMirrors.length} active mirrors.`, "text-blue-500");
                    updatePlayer(0);
                } else {
                    log("Direct ID not found. Brute-forcing search...", "text-red-500");
                    document.getElementById('main-video').src = `https://kodik.info/search?title=${encodeURIComponent(anime)}`;
                }
            } catch (e) {
                log("Kernel error. Retrying...", "text-red-500");
            }

            setTimeout(() => {
                document.getElementById('boot-loader').style.opacity = '0';
                setTimeout(() => document.getElementById('boot-loader').style.display = 'none', 700);
            }, 3000);
        }

        function updatePlayer(idx) {
            if (!activeMirrors[idx]) return;
            mirrorIndex = idx;
            const url = activeMirrors[idx];
            const domain = new URL(url).hostname;
            document.getElementById('main-video').src = url;
            log(`Redirected to shard: ${domain}`, "text-blue-400");
        }

        function switchMirror() {
            mirrorIndex = (mirrorIndex + 1) % activeMirrors.length;
            updatePlayer(mirrorIndex);
        }

        function shareLink() {
            navigator.clipboard.writeText(window.location.href);
            log("Room link copied to clipboard.", "text-white");
        }

        window.onload = init;
    </script>
</body>
</html>
