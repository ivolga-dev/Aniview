
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniView — Advanced Player</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #0a0a0c; color: #f4f4f5; font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(18, 18, 22, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .player-frame { background: #000; border-radius: 20px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        iframe { width: 100%; height: 100%; border: none; }
        .tab-active { background: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [query, setQuery] = useState('');
            const [results, setResults] = useState([]);
            const [top, setTop] = useState([]);
            const [selected, setSelected] = useState(null);
            const [activeSource, setActiveSource] = useState(0);

            useEffect(() => {
                // Загрузка популярных аниме при старте
                fetch("https://shikimori.one/api/animes?limit=24&order=popularity&kind=tv")
                    .then(r => r.json())
                    .then(data => setTop(data));
            }, []);

            const searchAnime = async (e) => {
                e.preventDefault();
                if (!query) return;
                const r = await fetch(`https://shikimori.one/api/animes?search=${encodeURIComponent(query)}&limit=30`);
                const data = await r.json();
                setResults(data);
            };

            const getSources = (anime) => {
                const sId = anime.id;
                // На основе анализа animekamui и других стабильных сайтов
                return [
                    { name: "Основной (Kodik)", url: `https://kodik.info/find-player?shikimori_id=${sId}` },
                    { name: "Альтернатива (Shiki)", url: `https://shikicinema.org/embed/${sId}` },
                    { name: "Зеркало (Bread)", url: `https://www.bread-m.ru/player/index.php?shikimori=${sId}` },
                    { name: "Запасной (Libria)", url: `https://api.allvideo.monster/shikimori/${sId}` }
                ];
            };

            return (
                <div className="min-h-screen pb-20">
                    <nav className="fixed top-0 w-full z-50 glass border-b border-white/5 px-6 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => {setResults([]); setQuery('');}}>
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black italic text-white shadow-lg shadow-blue-600/20">A</div>
                            <span className="font-black text-xl tracking-tighter uppercase">AniView</span>
                        </div>

                        <form onSubmit={searchAnime} className="flex-grow max-w-xl mx-8">
                            <input 
                                className="w-full bg-white/5 border border-white/10 rounded-2xl py-2.5 px-6 text-sm focus:outline-none focus:border-blue-500 transition-all"
                                placeholder="Введите название (например: Доктор Стоун)..."
                                value={query}
                                onChange={e => setQuery(e.target.value)}
                            />
                        </form>

                        <div className="hidden md:block text-[10px] font-bold text-zinc-500 uppercase tracking-widest bg-white/5 px-4 py-2 rounded-full border border-white/5">
                            Status: <span className="text-green-500">Bypassing Blocks</span>
                        </div>
                    </nav>

                    <main className="pt-28 px-6 max-w-[1400px] mx-auto">
                        <h2 className="text-2xl font-black uppercase italic tracking-tighter mb-8 flex items-center gap-4">
                            {results.length > 0 ? "Результаты поиска" : "Тренды сезона"}
                            <div className="h-px flex-grow bg-white/5"></div>
                        </h2>

                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                            {(results.length > 0 ? results : top).map(anime => (
                                <div key={anime.id} className="group cursor-pointer" onClick={() => {setSelected(anime); setActiveSource(0);}}>
                                    <div className="relative aspect-[3/4.5] rounded-[1.5rem] overflow-hidden bg-zinc-900 border border-white/5 shadow-xl transition-all group-hover:scale-[1.02] group-hover:shadow-blue-500/10">
                                        <img 
                                            src={`https://shikimori.one${anime.image.original}`} 
                                            className="w-full h-full object-cover grayscale-[30%] group-hover:grayscale-0 transition-all duration-500"
                                        />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80"></div>
                                        <div className="absolute top-3 right-3 bg-blue-600 px-2 py-1 rounded-lg text-[10px] font-bold text-white uppercase">★ {anime.score}</div>
                                        <div className="absolute bottom-4 left-4 right-4">
                                            <p className="text-white font-bold text-xs uppercase line-clamp-2 leading-tight tracking-tight">{anime.russian || anime.name}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {selected && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/95 backdrop-blur-3xl" onClick={() => setSelected(null)}></div>
                            <div className="relative w-full max-w-5xl aspect-video glass rounded-[2.5rem] overflow-hidden flex flex-col shadow-2xl">
                                
                                <div className="flex-grow relative bg-black">
                                    <iframe 
                                        src={getSources(selected)[activeSource].url} 
                                        allowFullScreen
                                    ></iframe>
                                    
                                    <div className="absolute top-6 left-6 flex flex-wrap gap-2">
                                        {getSources(selected).map((s, i) => (
                                            <button 
                                                key={i}
                                                onClick={() => setActiveSource(i)}
                                                className={`px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition-all border ${activeSource === i ? 'tab-active border-transparent' : 'bg-black/60 text-zinc-400 border-white/5 hover:text-white'}`}
                                            >
                                                {s.name}
                                            </button>
                                        ))}
                                    </div>

                                    <button onClick={() => setSelected(null)} className="absolute top-6 right-6 bg-black/60 p-2.5 rounded-full text-white hover:bg-red-600 transition border border-white/10">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M18 6 6 18M6 6l12 12"/></svg>
                                    </button>
                                </div>

                                <div className="p-6 bg-zinc-950/50 flex items-center justify-between border-t border-white/5">
                                    <div>
                                        <h3 className="text-white font-black text-xl uppercase italic tracking-tighter">{selected.russian || selected.name}</h3>
                                        <p className="text-[10px] font-bold text-zinc-500 uppercase mt-1 tracking-widest">
                                            Status: {selected.status} • Server: {getSources(selected)[activeSource].name}
                                        </p>
                                    </div>
                                    <div className="hidden sm:block">
                                        <span className="text-[9px] font-black text-blue-500 border border-blue-500/20 px-4 py-2 rounded-full uppercase tracking-[0.2em]">
                                            Secure Streaming
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
