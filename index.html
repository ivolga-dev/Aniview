<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeStream Lite</title>

<style>
body {
    font-family: Arial;
    background: #0f0c29;
    color: white;
    margin: 0;
}

.header {
    padding: 20px;
    text-align: center;
    font-size: 24px;
    background: #1e1e2f;
}

.container {
    padding: 20px;
}

input {
    padding: 10px;
    width: 70%;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: #1e1e2f;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
}

.title {
    padding: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="header">🎬 AnimeStream Lite</div>

<div class="container">
    <input id="search" placeholder="Поиск аниме...">
    <button onclick="searchAnime()">Поиск</button>

    <div id="grid" class="grid"></div>
</div>

<script>
const API = "https://api.jikan.moe/v4";

async function searchAnime() {
    const q = document.getElementById("search").value.trim();
    if (!q) return;

    const grid = document.getElementById("grid");
    grid.innerHTML = "Загрузка...";

    try {
        const res = await fetch(`${API}/anime?q=${q}&limit=20`);
        const data = await res.json();

        if (!data.data.length) {
            grid.innerHTML = "Ничего не найдено";
            return;
        }

        grid.innerHTML = data.data.map(a => `
            <div class="card" onclick="openAnime('${a.url}')">
                <img src="${a.images.jpg.image_url}">
                <div class="title">${a.title}</div>
            </div>
        `).join("");

    } catch {
        grid.innerHTML = "Ошибка загрузки";
    }
}

function openAnime(url) {
    window.open(url, "_blank");
}
</script>

</body>
</html>
