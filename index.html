
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniView Cinema — Аниме без рекламы</title>
    <!-- Подключаем React и Babel для работы в браузере -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS и Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #a1a1aa; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #1f1f23; border-radius: 10px; }
        .anime-card:hover img { transform: scale(1.05) translateY(-5px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [searchQuery, setSearchQuery] = useState('');
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [selectedAnime, setSelectedAnime] = useState(null);
            const [trending, setTrending] = useState([]);
            const [activeMirror, setActiveMirror] = useState(0);

            const SHIKIMORI_API = "https://shikimori.one/api/animes";

            useEffect(() => {
                fetchTrending();
            }, []);

            const fetchTrending = async () => {
                try {
                    const res = await fetch(`${SHIKIMORI_API}?limit=12&order=popularity&kind=tv`);
                    const data = await res.json();
                    setTrending(data);
                } catch (e) {
                    console.error("Ошибка загрузки трендов", e);
                }
            };

            const handleSearch = async (e) => {
                if (e) e.preventDefault();
                if (!searchQuery) return;
                setLoading(true);
                try {
                    const res = await fetch(`${SHIKIMORI_API}?search=${encodeURIComponent(searchQuery)}&limit=24`);
                    const data = await res.json();
                    setResults(data);
                } catch (e) {
                    console.error("Ошибка поиска", e);
                } finally {
                    setLoading(false);
                }
            };

            const getPlayerUrls = (anime) => {
                const title = anime.russian || anime.name;
                return [
                    `https://kodik.info/search?title=${encodeURIComponent(title)}&hide_selectors=true`,
                    `https://aniqit.com/search?title=${encodeURIComponent(title)}`,
                    `https://adshost.cc/search?title=${encodeURIComponent(title)}`,
                    `https://vidsrc.to/embed/anime/${anime.id}` 
                ];
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <nav className="fixed top-0 w-full z-40 bg-[#050505]/80 backdrop-blur-lg border-b border-white/5 px-6 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => {setResults([]); setSearchQuery('');}}>
                            <div className="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-lg shadow-blue-600/20">AV</div>
                            <span className="text-white font-black tracking-tighter text-xl uppercase italic hidden sm:inline">AniView</span>
                        </div>

                        <form onSubmit={handleSearch} className="relative w-full max-w-md mx-4">
                            <input 
                                type="text"
                                placeholder="Поиск аниме..."
                                className="w-full bg-zinc-900 border border-zinc-800 rounded-2xl py-2.5 pl-4 pr-12 text-sm focus:outline-none focus:border-blue-600 transition-all text-white"
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                            <button type="submit" className="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-white transition">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                            </button>
                        </form>

                        <div className="flex gap-4">
                            <div className="w-10 h-10 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center overflow-hidden">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar" />
                            </div>
                        </div>
                    </nav>

                    {/* Content */}
                    <main className="pt-28 px-6 max-w-[1600px] mx-auto">
                        <h2 className="text-white font-black text-2xl mb-8 uppercase italic tracking-tighter">
                            {results.length > 0 ? "Найденные аниме" : "Популярное сейчас"}
                        </h2>

                        {loading ? (
                            <div className="flex justify-center py-20">
                                <div className="w-10 h-10 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
                                {(results.length > 0 ? results : trending).map((anime) => (
                                    <div 
                                        key={anime.id} 
                                        className="anime-card group cursor-pointer space-y-3"
                                        onClick={() => {setSelectedAnime(anime); setActiveMirror(0);}}
                                    >
                                        <div className="relative aspect-[3/4.2] overflow-hidden rounded-2xl bg-zinc-900 border border-white/5">
                                            <img 
                                                src={`https://shikimori.one${anime.image.original}`} 
                                                className="w-full h-full object-cover transition-all duration-500 group-hover:brightness-50"
                                            />
                                            <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                                <div className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-xl shadow-blue-600/40 transform translate-y-4 group-hover:translate-y-0 transition-transform">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="m7 3 14 9-14 9z"/></svg>
                                                </div>
                                            </div>
                                            <div className="absolute top-3 left-3 bg-blue-600 text-white text-[10px] font-black px-2 py-1 rounded-md">
                                                ★ {anime.score}
                                            </div>
                                        </div>
                                        <h3 className="text-sm font-bold text-zinc-100 line-clamp-1 group-hover:text-blue-500 transition-colors">
                                            {anime.russian || anime.name}
                                        </h3>
                                        <div className="flex gap-2 text-[10px] font-bold text-zinc-600 uppercase">
                                            <span>{anime.kind}</span>
                                            <span>•</span>
                                            <span>{anime.episodes || "?"} эп.</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Modal Player */}
                    {selectedAnime && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-0 sm:p-6 md:p-12">
                            <div className="absolute inset-0 bg-black/95 backdrop-blur-md" onClick={() => setSelectedAnime(null)}></div>
                            <div className="relative w-full max-w-6xl bg-[#0a0a0a] border border-white/10 rounded-none sm:rounded-3xl overflow-hidden shadow-2xl flex flex-col h-full sm:h-auto">
                                
                                <div className="flex-grow aspect-video bg-black relative group">
                                    <iframe 
                                        src={getPlayerUrls(selectedAnime)[activeMirror]} 
                                        className="w-full h-full"
                                        allowFullScreen
                                    ></iframe>
                                    
                                    <div className="absolute top-4 left-4 flex gap-2 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity">
                                        {["Узел 1", "Узел 2", "Узел 3", "Глобал"].map((name, idx) => (
                                            <button 
                                                key={idx}
                                                onClick={() => setActiveMirror(idx)}
                                                className={`px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase border transition ${activeMirror === idx ? 'bg-blue-600 border-blue-500 text-white' : 'bg-black/60 border-white/10 text-zinc-400'}`}
                                            >
                                                {name}
                                            </button>
                                        ))}
                                    </div>
                                    <button 
                                        onClick={() => setSelectedAnime(null)}
                                        className="absolute top-4 right-4 bg-black/60 p-2 rounded-full text-white hover:bg-white/20 transition sm:hidden"
                                    >
                                        ✕
                                    </button>
                                </div>

                                <div className="p-6 bg-[#0a0a0a] flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                    <div>
                                        <h2 className="text-white font-black text-xl uppercase italic">{selectedAnime.russian || selectedAnime.name}</h2>
                                        <p className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-1">
                                            {selectedAnime.status === 'released' ? 'Завершено' : 'Онгоинг'} • {selectedAnime.aired_on?.split('-')[0]}
                                        </p>
                                    </div>
                                    <div className="flex gap-3 w-full sm:w-auto">
                                        <button 
                                            onClick={() => setSelectedAnime(null)}
                                            className="flex-1 sm:flex-none px-8 py-3 bg-white/5 hover:bg-white/10 text-white rounded-xl text-xs font-bold uppercase tracking-widest transition"
                                        >
                                            Закрыть
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
