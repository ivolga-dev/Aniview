
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniView — Fix 404 Global</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background-color: #030303; color: #94a3b8; margin: 0; }
        .neon-border { border: 1px solid rgba(59, 130, 246, 0.1); transition: all 0.3s ease; }
        .neon-border:hover { border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 0 30px rgba(59, 130, 246, 0.1); }
        iframe { background: #000; border: none; }
        .custom-loader { width: 40px; height: 40px; border: 3px solid #1d4ed8; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [query, setQuery] = useState('');
            const [results, setResults] = useState([]);
            const [trending, setTrending] = useState([]);
            const [selected, setSelected] = useState(null);
            const [node, setNode] = useState(0);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                fetch("https://shikimori.one/api/animes?limit=18&order=popularity")
                    .then(r => r.json())
                    .then(data => setTrending(data));
            }, []);

            const handleSearch = async (e) => {
                e.preventDefault();
                if (!query) return;
                setLoading(true);
                try {
                    const r = await fetch(`https://shikimori.one/api/animes?search=${encodeURIComponent(query)}&limit=24`);
                    const data = await r.json();
                    setResults(data);
                } catch (e) {}
                setLoading(false);
            };

            const getSources = (anime) => {
                const sId = anime.id;
                const title = encodeURIComponent(anime.russian || anime.name);
                
                return [
                    { 
                        name: "Сервер A (Auto)", 
                        url: `https://vidsrc.cc/v2/embed/anime/${sId}` // Новый эндпоинт, лучше понимает ID
                    },
                    { 
                        name: "Сервер B (Mirror)", 
                        url: `https://www.bread-m.ru/player/index.php?shikimori=${sId}` 
                    },
                    { 
                        name: "Сервер C (Legacy)", 
                        url: `https://black-m.ru/player/index.php?shikimori=${sId}` 
                    },
                    { 
                        name: "Kodik (Поиск)", 
                        url: `https://kodik.info/find-player?shikimori_id=${sId}` 
                    }
                ];
            };

            return (
                <div className="min-h-screen">
                    <header className="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/5 px-6 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => {setResults([]); setQuery('');}}>
                            <div className="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold italic">A</div>
                            <span className="text-white font-bold text-lg tracking-tighter">ANIVIEW</span>
                        </div>

                        <form onSubmit={handleSearch} className="flex-grow max-w-lg mx-6 relative">
                            <input 
                                className="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 px-5 text-sm text-white focus:outline-none focus:border-blue-600 transition-all"
                                placeholder="Поиск аниме..."
                                value={query}
                                onChange={e => setQuery(e.target.value)}
                            />
                        </form>
                        <div className="text-[10px] font-bold text-zinc-600 uppercase tracking-widest hidden sm:block">UAE Optimised</div>
                    </header>

                    <main className="pt-24 px-6 max-w-7xl mx-auto pb-10">
                        {loading && (
                            <div className="fixed inset-0 z-[100] bg-black/50 flex items-center justify-center backdrop-blur-sm">
                                <div className="custom-loader"></div>
                            </div>
                        )}

                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                            {(results.length > 0 ? results : trending).map(anime => (
                                <div key={anime.id} className="group cursor-pointer" onClick={() => {setSelected(anime); setNode(0);}}>
                                    <div className="relative aspect-[3/4.5] rounded-2xl overflow-hidden bg-zinc-900 neon-border">
                                        <img 
                                            src={`https://shikimori.one${anime.image.original}`} 
                                            className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
                                        />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                                        <div className="absolute bottom-3 left-3 right-3">
                                            <p className="text-[10px] font-bold text-white leading-tight uppercase line-clamp-2">{anime.russian || anime.name}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {selected && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-0 sm:p-4">
                            <div className="absolute inset-0 bg-black/95 backdrop-blur-md" onClick={() => setSelected(null)}></div>
                            <div className="relative w-full max-w-5xl aspect-video bg-black sm:rounded-3xl overflow-hidden shadow-2xl border border-white/10 flex flex-col h-full sm:h-auto">
                                <div className="flex-grow relative bg-black">
                                    <iframe 
                                        src={getSources(selected)[node].url} 
                                        className="w-full h-full"
                                        allowFullScreen
                                    ></iframe>
                                    
                                    <div className="absolute top-4 left-4 flex flex-wrap gap-2">
                                        {getSources(selected).map((s, i) => (
                                            <button 
                                                key={i}
                                                onClick={() => setNode(i)}
                                                className={`px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all ${node === i ? 'bg-blue-600 text-white border-blue-400' : 'bg-black/60 text-zinc-400 border border-white/10 hover:text-white'}`}
                                            >
                                                {s.name}
                                            </button>
                                        ))}
                                    </div>

                                    <button onClick={() => setSelected(null)} className="absolute top-4 right-4 bg-black/60 p-2 rounded-full text-white hover:bg-red-600 transition">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
                                    </button>
                                </div>
                                <div className="p-4 bg-zinc-950 flex items-center justify-between">
                                    <p className="text-xs font-bold text-white uppercase italic">{selected.russian || selected.name}</p>
                                    <span className="text-[9px] font-bold text-zinc-600 uppercase">System: {getSources(selected)[node].name}</span>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
