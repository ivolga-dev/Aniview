
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AniView v5.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05070a; color: #e6edf3; font-family: system-ui, sans-serif; overflow-x: hidden; }
        .glass { background: #0d1117; border: 1px solid #30363d; border-radius: 20px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        iframe { border-radius: 12px; background: #000; }
        .log-line { font-family: monospace; font-size: 11px; opacity: 0.7; }
    </style>
</head>
<body class="p-4 sm:p-6 lg:p-10">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- Top Info -->
        <div class="flex justify-between items-end">
            <div>
                <h1 id="anime-title" class="text-2xl font-black uppercase tracking-tighter text-white">AniView</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="api-status" class="status-dot bg-zinc-600"></span>
                    <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Global Proxy Engine</span>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-zinc-600 font-bold uppercase italic">Status</p>
                <p id="system-status" class="text-[10px] text-blue-500 font-bold uppercase">Ready</p>
            </div>
        </div>

        <!-- Main Player -->
        <div class="glass p-1.5 relative aspect-video shadow-2xl">
            <iframe id="player" class="w-full h-full" src="" frameborder="0" allowfullscreen allow="autoplay"></iframe>
            
            <div id="loader" class="absolute inset-0 bg-[#05070a] flex flex-col items-center justify-center z-50 transition-opacity duration-500">
                <div class="w-10 h-10 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-[10px] font-mono tracking-widest text-blue-600 animate-pulse uppercase">Searching for mirrors...</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-wrap gap-3">
            <button onclick="tryNextMirror()" class="flex-1 bg-white/5 hover:bg-white/10 border border-white/10 py-4 rounded-xl text-[10px] font-black uppercase tracking-widest transition active:scale-95">
                Сменить зеркало
            </button>
            <button onclick="copyRoom()" class="flex-1 bg-blue-600 hover:bg-blue-500 py-4 rounded-xl text-[10px] font-black uppercase tracking-widest text-white transition active:scale-95">
                Поделиться
            </button>
        </div>

        <!-- Logs -->
        <div class="glass p-5 space-y-3">
            <p class="text-[9px] font-bold text-zinc-600 uppercase tracking-[0.2em] border-b border-white/5 pb-2">Analysis Log</p>
            <div id="log-container" class="h-20 overflow-y-auto space-y-1">
                <p class="log-line">> System initialized.</p>
            </div>
        </div>
    </div>

    <script>
        const API = "https://ivolga392-my-anime-api.hf.space";
        const params = new URLSearchParams(window.location.search);
        const animeQuery = params.get('title') || params.get('q') || "Dr. Stone";
        
        let mirrorLinks = [];
        let currentMirrorIdx = 0;

        function addLog(msg, color = "text-zinc-500") {
            const log = document.getElementById('log-container');
            log.innerHTML += `<p class="log-line ${color}">> ${msg}</p>`;
            log.scrollTop = log.scrollHeight;
        }

        async function init() {
            document.getElementById('anime-title').innerText = animeQuery;
            addLog(`Requesting: ${animeQuery}`);

            try {
                const check = await fetch(API + "/");
                if(check.ok) {
                    document.getElementById('api-status').classList.replace('bg-zinc-600', 'bg-green-500');
                    document.getElementById('system-status').innerText = "Online";
                    addLog("Cloud Connection: ESTABLISHED", "text-green-500");
                }
            } catch(e) {
                addLog("Cloud Offline. Using local fallback.", "text-red-500");
            }

            try {
                const response = await fetch(`${API}/search?q=${encodeURIComponent(animeQuery)}`);
                const data = await response.json();

                const player = document.getElementById('player');
                if(data.found && data.alternatives) {
                    mirrorLinks = data.alternatives;
                    player.src = mirrorLinks[0];
                    addLog(`Success: Found ${mirrorLinks.length} streams.`, "text-blue-500");
                } else {
                    addLog("No direct streams. Entering Search Mode...", "text-yellow-500");
                    player.src = `https://kodik.info/search?title=${encodeURIComponent(animeQuery)}&hide_selectors=true`;
                }
            } catch(e) {
                addLog("API Error. Emergency search active.", "text-red-500");
                document.getElementById('player').src = `https://kodik.info/search?title=${encodeURIComponent(animeQuery)}`;
            }

            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 2500);
        }

        function tryNextMirror() {
            if(mirrorLinks.length < 2) {
                addLog("No alternative mirrors found for this title.", "text-zinc-600");
                return;
            }
            currentMirrorIdx = (currentMirrorIdx + 1) % mirrorLinks.length;
            const domain = new URL(mirrorLinks[currentMirrorIdx]).hostname;
            addLog(`Switched to: ${domain}`, "text-blue-400");
            document.getElementById('player').src = mirrorLinks[currentMirrorIdx];
        }

        function copyRoom() {
            navigator.clipboard.writeText(window.location.href);
            alert("Ссылка на комнату скопирована!");
        }

        window.onload = init;
    </script>
</body>
</html>
