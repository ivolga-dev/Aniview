<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeStream Ultra</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #0f1116; color: #fff; }
        .header { background: #1a1d24; padding: 15px 20px; border-bottom: 2px solid #3a7bd5; sticky; top: 0; z-index: 100; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .search-section { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1d24; color: #fff; outline: none; }
        .search-btn { padding: 12px 20px; background: #3a7bd5; border: none; border-radius: 8px; color: #fff; cursor: pointer; font-weight: bold; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .anime-card { background: #1a1d24; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .anime-card:hover { border-color: #3a7bd5; transform: translateY(-3px); }
        .anime-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .anime-info { padding: 10px; font-size: 0.85rem; text-align: center; }

        .player-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; }
        .player-modal.active { display: block; }
        .modal-content { max-width: 900px; margin: 20px auto; padding: 10px; }
        .close-btn { float: right; font-size: 30px; color: #fff; background: none; border: none; cursor: pointer; padding: 0 10px 10px; }
        .player-container { background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; width: 100%; border: 1px solid #333; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; }
        .anime-details { margin-top: 20px; padding: 10px; color: #aaa; font-size: 0.95rem; }
        .loading { color: #3a7bd5; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% {opacity: 0.5;} 50% {opacity: 1;} 100% {opacity: 0.5;} }
        .error { color: #ff4d4d; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="header"><h2>🎬 AnimeStream</h2></div>

    <div class="container">
        <div class="search-section">
            <input type="text" class="search-box" id="searchInput" placeholder="Введите название аниме...">
            <button class="search-btn" onclick="searchAnime()">Найти</button>
        </div>
        <div id="animeGrid" class="content-grid"></div>
    </div>

    <div id="playerModal" class="player-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closePlayer()">&times;</button>
            <div class="player-container" id="videoContainer"></div>
            <div id="animeDetails" class="anime-details"></div>
        </div>
    </div>

    <script>
        const JIKAN_API = 'https://api.jikan.moe/v4';
        const KODIK_TOKEN = '77a064344baaef3988583486337581ff';

        async function loadCategory() {
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = '<div class="loading">Загрузка топа...</div>';
            try {
                const res = await fetch(`${JIKAN_API}/top/anime?limit=18`);
                const data = await res.json();
                renderGrid(data.data);
            } catch (e) { grid.innerHTML = '<div class="error">Ошибка загрузки API</div>'; }
        }

        async function searchAnime() {
            const q = document.getElementById('searchInput').value;
            if(!q) return;
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = '<div class="loading">Поиск...</div>';
            try {
                const res = await fetch(`${JIKAN_API}/anime?q=${encodeURIComponent(q)}&limit=18`);
                const data = await res.json();
                renderGrid(data.data);
            } catch (e) { grid.innerHTML = '<div class="error">Ничего не найдено</div>'; }
        }

        function renderGrid(list) {
            document.getElementById('animeGrid').innerHTML = list.map(a => `
                <div class="anime-card" onclick="openAnime(${a.mal_id})">
                    <img src="${a.images.jpg.large_image_url}" class="anime-poster">
                    <div class="anime-info">${a.title}</div>
                </div>
            `).join('');
        }

        async function openAnime(id) {
            const modal = document.getElementById('playerModal');
            const container = document.getElementById('videoContainer');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            container.innerHTML = '<div class="loading">Ищем плеер...</div>';

            try {
                const infoRes = await fetch(`${JIKAN_API}/anime/${id}`);
                const info = await infoRes.json();
                const anime = info.data;
                
                document.getElementById('animeDetails').innerHTML = `
                    <h2 style="color:#fff; margin-bottom:5px">${anime.title}</h2>
                    <p style="margin-bottom:10px">Тип: ${anime.type} | Оценка: ${anime.score || '?'}</p>
                    <p>${anime.synopsis || 'Нет описания.'}</p>
                `;

                // Проверка: если это не аниме (манга, новелла), сразу пишем ошибку
                if (anime.type.toLowerCase().includes('manga') || anime.type.toLowerCase().includes('novel')) {
                    container.innerHTML = '<div class="error">Это манга. Видео доступно только для аниме-адаптаций.</div>';
                    return;
                }

                // Логика поиска с тайм-аутом (7 секунд)
                let found = false;
                const callbackName = 'kodik_cb_' + id;
                
                const timer = setTimeout(() => {
                    if (!found) {
                        container.innerHTML = '<div class="error">Поиск занял слишком много времени. Попробуйте другое аниме или отключите VPN/AdBlock.</div>';
                        delete window[callbackName];
                    }
                }, 7000);

                window[callbackName] = function(data) {
                    found = true;
                    clearTimeout(timer);
                    if (data.results && data.results.length > 0) {
                        let link = data.results[0].link;
                        if(!link.startsWith('http')) link = 'https:' + link;
                        container.innerHTML = `<iframe src="${link}" allowfullscreen></iframe>`;
                    } else {
                        container.innerHTML = '<div class="error">Видео не найдено в базе плеера.</div>';
                    }
                    delete window[callbackName];
                };

                const script = document.createElement('script');
                script.src = `https://kodikapi.com/search?token=${KODIK_TOKEN}&shikimori_id=${id}&callback=${callbackName}`;
                document.body.appendChild(script);
                script.onload = () => script.remove();

            } catch (e) {
                container.innerHTML = '<div class="error">Ошибка подключения.</div>';
            }
        }

        function closePlayer() {
            document.getElementById('playerModal').classList.remove('active');
            document.getElementById('videoContainer').innerHTML = '';
            document.body.style.overflow = 'auto';
        }

        loadCategory();
    </script>
</body>
</html>
