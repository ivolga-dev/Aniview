<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime View Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05070a; color: #e1e1e1; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background: #0d1117; border: 1px solid #21262d; border-radius: 24px; }
        .btn-primary { background: #1f6feb; transition: all 0.2s; }
        .btn-primary:hover { background: #388bfd; transform: translateY(-1px); }
        .status-tag { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Анимация загрузки */
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #1f6feb;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center">
    <div class="w-full max-w-4xl space-y-6">
        
        <!-- Header -->
        <div class="flex justify-between items-center bg-[#0d1117] p-4 rounded-2xl border border-[#21262d]">
            <div>
                <h1 id="anime-title" class="text-xl font-black uppercase tracking-tighter italic text-white">Loading...</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="api-status" class="w-2 h-2 rounded-full bg-red-500"></span>
                    <span class="status-tag text-zinc-500">Cloud Engine: <span id="status-text">Connecting</span></span>
                </div>
            </div>
            <button onclick="location.reload()" class="p-2 hover:bg-zinc-800 rounded-lg text-zinc-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>

        <!-- Player -->
        <div class="card overflow-hidden shadow-2xl relative aspect-video bg-black">
            <iframe id="video-frame" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
            
            <div id="player-overlay" class="absolute inset-0 bg-[#05070a] flex flex-col items-center justify-center space-y-4">
                <span class="loader"></span>
                <p class="status-tag text-zinc-400">Синхронизация с облаком...</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="card p-6 flex flex-col justify-center">
                <p class="status-tag text-zinc-500 mb-2">Обход блокировок</p>
                <div class="flex gap-2">
                    <button onclick="switchMirror()" class="btn-primary text-white text-xs font-bold py-3 px-6 rounded-xl flex-1 uppercase">Следующий источник</button>
                </div>
            </div>
            
            <div class="card p-6">
                <p class="status-tag text-zinc-500 mb-2">Лог системы</p>
                <div id="logs" class="text-[10px] font-mono text-zinc-400 space-y-1">
                    <p>> Инициализация...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- ЗАМЕНИ ЭТО НА СВОЮ ССЫЛКУ ИЗ HUGGING FACE ---
        const API_URL = "https://ivolga392-my-anime-api.hf.space";

        const mirrors = [
            "https://aniqit.com",
            "https://kodik.info",
            "https://linkst.pro",
            "https://dwn.st"
        ];
        let mirrorIdx = 0;

        const params = new URLSearchParams(window.location.search);
        const title = params.get('title') || "Dr. Stone";

        function addLog(msg) {
            const logs = document.getElementById('logs');
            logs.innerHTML += `<p>> ${msg}</p>`;
        }

        async function init() {
            document.getElementById('anime-title').innerText = title;
            addLog(`Запрос: ${title}`);

            // Проверка API
            try {
                const res = await fetch(API_URL + "/");
                if(res.ok) {
                    document.getElementById('api-status').classList.replace('bg-red-500', 'bg-green-500');
                    document.getElementById('status-text').innerText = "Online";
                    document.getElementById('status-text').classList.add('text-green-500');
                    addLog("Связь с HuggingFace установлена");
                }
            } catch (e) {
                addLog("Ошибка API: Space засыпает или недоступен");
            }

            loadVideo();
        }

        function loadVideo() {
            const currentMirror = mirrors[mirrorIdx];
            const frame = document.getElementById('video-frame');
            const overlay = document.getElementById('player-overlay');

            addLog(`Пробуем зеркало: ${new URL(currentMirror).hostname}`);
            
            // Основная стратегия: поиск через зеркало
            frame.src = `${currentMirror}/search?title=${encodeURIComponent(title)}&hide_selectors=false`;

            setTimeout(() => {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500);
            }, 2500);
        }

        function switchMirror() {
            mirrorIdx = (mirrorIdx + 1) % mirrors.length;
            document.getElementById('player-overlay').style.display = 'flex';
            document.getElementById('player-overlay').style.opacity = '1';
            loadVideo();
        }

        window.onload = init;
    </script>
</body>
</html>
