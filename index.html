
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniView — No Limits</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050507; color: #8e9196; margin: 0; }
        .neon-text { text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .glass-card { background: rgba(13, 13, 17, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .anime-poster:hover img { transform: scale(1.05); filter: brightness(0.4); }
        iframe { background: #000; border: none; width: 100%; height: 100%; }
        .active-node { background: #2563eb !important; color: white !important; border-color: #3b82f6 !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [search, setSearch] = useState('');
            const [items, setItems] = useState([]);
            const [top, setTop] = useState([]);
            const [active, setActive] = useState(null);
            const [source, setSource] = useState(0);

            useEffect(() => {
                fetch("https://shikimori.one/api/animes?limit=24&order=popularity")
                    .then(r => r.json()).then(data => setTop(data));
            }, []);

            const doSearch = async (e) => {
                e.preventDefault();
                if (!search) return;
                const r = await fetch(`https://shikimori.one/api/animes?search=${encodeURIComponent(search)}&limit=30`);
                const data = await r.json();
                setItems(data);
            };

            const getMirrors = (anime) => {
                const id = anime.id;
                // Мы используем базы, которые сами находят рабочие плееры
                return [
                    { name: "Плеер 1 (Smart)", url: `https://shikicinema.org/embed/${id}` },
                    { name: "Плеер 2 (Multi)", url: `https://player.vidsrc.pro/anime/shikimori/${id}` },
                    { name: "Плеер 3 (Mirror)", url: `https://www.bread-m.ru/player/index.php?shikimori=${id}` },
                    { name: "Плеер 4 (Kodik)", url: `https://kodik.info/find-player?shikimori_id=${id}` }
                ];
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <nav className="fixed top-0 w-full z-50 glass-card px-6 py-4 flex items-center justify-between border-b">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setItems([])}>
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                                <span className="text-white font-black italic">A</span>
                            </div>
                            <h1 className="text-white font-black tracking-tighter text-2xl uppercase neon-text">AniView</h1>
                        </div>

                        <form onSubmit={doSearch} className="flex-grow max-w-lg mx-6 relative">
                            <input 
                                className="w-full bg-white/5 border border-white/10 rounded-2xl py-3 px-6 text-sm text-white focus:outline-none focus:border-blue-600 transition-all"
                                placeholder="Найти аниме по названию..."
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                            />
                        </form>
                        
                        <div className="hidden sm:block text-[10px] font-bold text-blue-500 uppercase tracking-widest bg-blue-500/10 px-3 py-1 rounded-full border border-blue-500/20">
                            UAE Stable
                        </div>
                    </nav>

                    {/* Main */}
                    <main className="pt-28 px-6 max-w-7xl mx-auto pb-20">
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                            {(items.length > 0 ? items : top).map(anime => (
                                <div key={anime.id} className="cursor-pointer group" onClick={() => {setActive(anime); setSource(0);}}>
                                    <div className="anime-poster relative aspect-[3/4.5] rounded-3xl overflow-hidden bg-zinc-900 shadow-2xl border border-white/5 transition-all duration-300">
                                        <img src={`https://shikimori.one${anime.image.original}`} className="w-full h-full object-cover transition-all duration-500" />
                                        <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                            <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center text-black">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="m7 3 14 9-14 9z"/></svg>
                                            </div>
                                        </div>
                                        <div className="absolute top-3 right-3 bg-blue-600 text-[9px] font-black px-2 py-1 rounded text-white uppercase">{anime.score}</div>
                                    </div>
                                    <p className="mt-3 text-xs font-bold text-zinc-100 line-clamp-1 group-hover:text-blue-500 transition-colors uppercase">{anime.russian || anime.name}</p>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Modal */}
                    {active && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center sm:p-6">
                            <div className="absolute inset-0 bg-black/95 backdrop-blur-md" onClick={() => setActive(null)}></div>
                            <div className="relative w-full max-w-5xl glass-card sm:rounded-[2.5rem] overflow-hidden flex flex-col h-full sm:h-auto shadow-2xl">
                                
                                <div className="flex-grow aspect-video bg-black relative">
                                    <iframe src={getMirrors(active)[source].url} allowFullScreen></iframe>
                                    
                                    <div className="absolute top-4 left-4 flex flex-wrap gap-2">
                                        {getMirrors(active).map((m, i) => (
                                            <button 
                                                key={i}
                                                onClick={() => setSource(i)}
                                                className={`px-3 py-1.5 rounded-xl text-[10px] font-bold uppercase transition-all border ${source === i ? 'active-node' : 'bg-black/60 text-zinc-500 border-white/5 hover:text-white'}`}
                                            >
                                                {m.name}
                                            </button>
                                        ))}
                                    </div>

                                    <button onClick={() => setActive(null)} className="absolute top-4 right-4 bg-black/60 p-2 rounded-full text-white hover:bg-white/10 transition">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
                                    </button>
                                </div>

                                <div className="p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="text-center md:text-left">
                                        <h3 className="text-white font-black text-xl uppercase tracking-tighter">{active.russian || active.name}</h3>
                                        <p className="text-[10px] text-zinc-500 font-bold uppercase mt-1">Сервер: {getMirrors(active)[source].name} • Статус: {active.status}</p>
                                    </div>
                                    <div className="flex gap-4">
                                        <button 
                                            onClick={() => window.open(`https://shikimori.one${active.url}`, '_blank')}
                                            className="px-6 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-bold text-white uppercase hover:bg-white/10 transition"
                                        >
                                            Shikimori
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
